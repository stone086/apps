# 寮哄ぇ鐨凙PI浠ｇ悊鏈嶅姟锛屽皢Gemini CLI/Kiro/Qwen Code绛夊鎴风涓撳睘澶фā鍨嬭浆涓篛penAI鍏煎鎺ュ彛

local app_id="AIClient-2-API"
local app_name="AIClient-2-API"
local app_text="AI瀹㈡埛绔浆API浠ｇ悊锛屽皢Gemini/Kiro/Qwen Code绛夊鎴风澶фā鍨嬭浆涓篛penAI鍏煎鎺ュ彛"
local app_url="https://github.com/justlovemaki/AIClient-2-API"
local docker_name="aiclient-2-api"
local docker_port="${docker_port:-3000}"
local app_size="2"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/configs" "${app_dir}/logs"
    cd "${app_dir}" || return 1

    # 鍐欏叆 Docker Compose
    cat <<EOF > docker-compose.yml
services:
  aiclient-2-api:
    image: justlikemaki/aiclient-2-api:latest
    container_name: aiclient-2-api
    restart: unless-stopped
    ports:
      - "${docker_port}:3000"
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
EOF

    # 鍚姩瀹瑰櫒
    echo "姝ｅ湪鎷夊彇骞跺惎鍔?AIClient-2-API..."
    docker compose up -d

    # 绛夊緟鏈嶅姟灏辩华锛堝仴搴锋鏌ワ級
    echo "绛夊緟 AIClient-2-API 鍒濆鍖?.."
    for i in $(seq 1 12); do
        sleep 5
        if curl -s -o /dev/null -w '' --max-time 3 http://127.0.0.1:${docker_port}/ 2>/dev/null; then
            break
        fi
    done

    echo "------------------------------------------------"
    echo "  AIClient-2-API 瀹夎瀹屾垚锛?
    check_docker_app_ip
    echo "  璁块棶鍦板潃锛歨ttp://<IP>:${docker_port}"
    echo "  榛樿鐢ㄦ埛鍚? admin"
    echo "  榛樿瀵嗙爜: admin123"
    echo "  璇风櫥褰曞悗绔嬪嵆鍦ㄨ缃腑淇敼瀵嗙爜锛?
    echo "  閰嶇疆鐩綍锛?{app_dir}/configs"
    echo "  鏃ュ織鐩綍锛?{app_dir}/logs"
    echo "------------------------------------------------"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "AIClient-2-API 宸叉洿鏂拌嚦鏈€鏂扮増鏈€?
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "AIClient-2-API 宸插交搴曞嵏杞斤紝鍖呮嫭鎵€鏈夋暟鎹€?
}

