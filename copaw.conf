# --- 基础信息 / Basic Information ---
local app_id="copaw"
local app_name="CoPaw AI Assistant"
local app_text="阿里开源的个人AI助手，支持钉钉/飞书/QQ/Discord多渠道，内置技能系统与长期记忆。"
local app_url="https://github.com/agentscope-ai/CoPaw"
local docker_name="copaw"
local docker_port="8088"
local app_size="2"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    # 1. 环境准备
    local base_dir="/home/docker/copaw"
    mkdir -p "$base_dir/data" && cd "$base_dir"

    # 2. 写入 Docker Compose
    cat <<EOF > docker-compose.yml
services:
  copaw:
    image: agentscope/copaw:latest
    container_name: copaw
    restart: unless-stopped
    ports:
      - "${docker_port}:8088"
    volumes:
      - ./data:/app/working
EOF

    # 3. 启动容器
    echo "正在拉取并启动 CoPaw..."
    docker compose up -d

    echo "------------------------------------------------"
    echo "  CoPaw AI Assistant 安装完成！"
    check_docker_app_ip
    echo "  打开浏览器访问控制台进行初始配置"
    echo "  在 Settings → Models 中配置 API Key"
    echo "------------------------------------------------"
}

docker_app_update() {
    cd /home/docker/copaw
    echo "正在更新 CoPaw..."
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/copaw
    echo "正在卸载 CoPaw..."
    docker compose down --rmi all
    rm -rf /home/docker/copaw
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 / Registration ---
docker_app_plus
