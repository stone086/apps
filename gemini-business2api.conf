# --- 基础信息 / Basic Information ---
app_id="gemini-business2api" # 和文件名一致，用于安装状态检测 / Same as the filename, used for installation status detection.
app_name="Gemini Business2API" # 应用显示名称
app_text="Gemini Business 转 OpenAI 兼容 API（含管理面板/多账号负载）" # 一句话简介
app_url="https://github.com/Dreamy-rain/gemini-business2api" # 官网链接
docker_name="gemini-business2api" # 容器启动后的名称
docker_port="7860" # 默认访问端口
app_size="1" # 占用空间大小(GB)

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    mkdir -p /home/docker/gemini-business2api && cd /home/docker/gemini-business2api

    # 端口可自定义
    local app_port=${docker_port}

    # 初始化 .env（给用户一个可编辑入口）
    if [ ! -f .env ]; then
        cat > .env <<'ENV'
# 管理面板登录密钥（必须修改）
ADMIN_KEY=please_change_me

# 可选：API Key，逗号分隔；留空则公开访问（不建议）
# API_KEY=key1,key2

# 可选：PostgreSQL 连接串；默认不配则使用 SQLite（/app/data 内 data.db）
# DATABASE_URL=postgresql://user:password@host/dbname?sslmode=require
ENV
    fi

    # 直接生成完整的 docker-compose.yml（避免 sed 修改带来的格式问题）
    cat > docker-compose.yml <<YML
services:
  gemini-business2api:
    image: cooooookk/gemini-business2api:latest
    container_name: gemini-business2api
    restart: unless-stopped
    ports:
      - "${app_port}:7860"
    env_file:
      - .env
    volumes:
      - ./app:/app/data
YML

    docker compose up -d

    echo ""
    echo "========================================"
    echo "  安装完成 / Install Complete"
    echo "========================================"
    echo "  默认管理密码: please_change_me"
    echo "  登录后请在管理面板修改密码"
    echo "========================================"
    echo ""

    check_docker_app_ip
}

docker_app_update() {
    cd /home/docker/gemini-business2api
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/gemini-business2api
    docker compose down --rmi all
    rm -rf /home/docker/gemini-business2api
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 (必须包含) / Registration (Mandatory) ---
docker_app_plus
