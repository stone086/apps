<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBTS - PDF Upload Runner</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 14px;
      color: var(--muted);
    }
    .field input,
    .field select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
    }
    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    code {
      background: #f1e8da;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .mono {
      font-family: Consolas, "Courier New", monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="layout">
    <header class="hero">
      <p class="eyebrow">BBTS Cloud</p>
      <h1>PDF Upload Runner</h1>
      <p class="desc">Upload a local PDF to your GitHub repo and trigger OCR in GitHub Actions.</p>
      <a class="back" href="./index.html">Back to BBTS</a>
    </header>

    <section class="panel">
      <h2>GitHub Settings</h2>
      <div class="grid">
        <div class="field">
          <label for="owner">Owner</label>
          <input id="owner" value="stone086" />
        </div>
        <div class="field">
          <label for="repo">Repo</label>
          <input id="repo" value="BBTS" />
        </div>
        <div class="field">
          <label for="branch">Branch</label>
          <input id="branch" value="main" />
        </div>
      </div>
      <div class="field" style="margin-top: 10px;">
        <label for="token">GitHub Token (classic: <code>repo</code> + <code>workflow</code>)</label>
        <input id="token" type="password" placeholder="ghp_..." />
      </div>
      <p class="hint">Token is used only in this browser session to call GitHub API.</p>
    </section>

    <section class="panel">
      <h2>PDF + OCR Options</h2>
      <div class="field">
        <label for="pdfFile">PDF File</label>
        <input id="pdfFile" type="file" accept="application/pdf" />
      </div>
      <div class="grid" style="margin-top: 10px;">
        <div class="field">
          <label for="dpi">DPI</label>
          <input id="dpi" type="number" min="100" max="600" value="300" />
        </div>
        <div class="field">
          <label for="readingOrder">Reading Order</label>
          <select id="readingOrder">
            <option value="rtl_tb" selected>rtl_tb (top-to-bottom, right-to-left)</option>
            <option value="ltr_tb">ltr_tb</option>
            <option value="auto">auto</option>
            <option value="ocr">ocr</option>
          </select>
        </div>
        <div class="field">
          <label for="startPage">Start Page</label>
          <input id="startPage" type="number" min="1" value="1" />
        </div>
        <div class="field">
          <label for="endPage">End Page (optional)</label>
          <input id="endPage" type="number" min="1" placeholder="blank = all" />
        </div>
      </div>
      <div class="actions">
        <button id="runBtn">Upload and Run in Cloud</button>
      </div>
      <p id="status" class="status"></p>
      <p id="result" class="hint mono"></p>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const runBtn = document.getElementById("runBtn");

    const setStatus = (msg) => { statusEl.textContent = msg; };
    const setResult = (msg) => { resultEl.textContent = msg; };

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          let binary = "";
          const chunk = 0x8000;
          for (let i = 0; i < bytes.length; i += chunk) {
            const part = bytes.subarray(i, i + chunk);
            binary += String.fromCharCode.apply(null, part);
          }
          resolve(btoa(binary));
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    async function githubRequest(url, token, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      if (!res.ok) {
        let details = "";
        try {
          const body = await res.json();
          details = body.message || JSON.stringify(body);
        } catch {
          details = await res.text();
        }
        throw new Error(`GitHub API ${res.status}: ${details}`);
      }
      if (res.status === 204) return {};
      return res.json();
    }

    runBtn.addEventListener("click", async () => {
      try {
        runBtn.disabled = true;
        setResult("");

        const owner = document.getElementById("owner").value.trim();
        const repo = document.getElementById("repo").value.trim();
        const branch = document.getElementById("branch").value.trim();
        const token = document.getElementById("token").value.trim();
        const pdfFile = document.getElementById("pdfFile").files[0];
        const dpi = document.getElementById("dpi").value.trim() || "300";
        const readingOrder = document.getElementById("readingOrder").value;
        const startPage = document.getElementById("startPage").value.trim() || "1";
        const endPage = document.getElementById("endPage").value.trim();

        if (!owner || !repo || !branch || !token) {
          throw new Error("Please fill owner, repo, branch, and token.");
        }
        if (!pdfFile) {
          throw new Error("Please choose a PDF file.");
        }

        const safeName = pdfFile.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        const repoPath = `BBTS/uploads/${stamp}_${safeName}`;

        setStatus("1/3 Encoding PDF...");
        const contentBase64 = await fileToBase64(pdfFile);

        setStatus("2/3 Uploading PDF to repository...");
        const contentApi = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(repoPath)}`;
        await githubRequest(contentApi, token, {
          method: "PUT",
          body: JSON.stringify({
            message: `Upload PDF for OCR: ${safeName}`,
            content: contentBase64,
            branch
          })
        });

        setStatus("3/3 Triggering workflow...");
        const workflowApi = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/trad-pdf-to-simp-from-repo.yml/dispatches`;
        await githubRequest(workflowApi, token, {
          method: "POST",
          body: JSON.stringify({
            ref: branch,
            inputs: {
              pdf_path: repoPath,
              dpi,
              reading_order: readingOrder,
              start_page: startPage,
              end_page: endPage,
              save_raw_per_page: "false"
            }
          })
        });

        setStatus("Started. Open Actions to monitor progress.");
        setResult(
          `Uploaded: ${repoPath}\nActions: https://github.com/${owner}/${repo}/actions/workflows/trad-pdf-to-simp-from-repo.yml`
        );
      } catch (err) {
        setStatus(`Failed: ${err.message}`);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
