# --- 基础信息 / Basic Information ---
local app_id="pika"
local app_name="Pika Monitor"
local app_text="基于 Go 的实时探针监控系统，支持性能监控、服务监控与安全审计。"
local app_url="https://github.com/dushixiang/pika"
local docker_name="pika-server"
local docker_port="8080"
local app_size="2"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    # 1. 环境准备
    local base_dir="/home/docker/pika"
    mkdir -p "$base_dir/data" && cd "$base_dir"

    # 2. 下载官方配置文件
    echo "正在获取官方配置..."
    curl -sL https://raw.githubusercontent.com/dushixiang/pika/main/config.sqlite.yaml -o config.yaml
    
    # 3. 写入 Docker Compose (SQLite 版本)
    cat <<EOF > docker-compose.yml
services:
  pika:
    image: dushixiang/pika:latest
    container_name: pika-server
    restart: unless-stopped
    ports:
      - "${docker_port}:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    depends_on:
      - victoriametrics

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: pika-victoriametrics
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-httpListenAddr=:8428"
    volumes:
      - ./data/vmstorage:/storage
EOF

    # 4. 启动容器
    echo "正在启动 Pika Monitor 及其时序数据库..."
    docker compose up -d

    echo "------------------------------------------------"
    echo "  Pika Monitor 安装完成！"
    check_docker_app_ip
    echo "  默认用户名: admin"
    echo "  默认密码: admin123"
    echo "  请登录后立即在设置中修改密码！"
    echo "------------------------------------------------"
    
    
}

docker_app_update() {
    cd /home/docker/pika
    echo "正在更新 Pika 镜像..."
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/pika
    echo "正在卸载 Pika Monitor..."
    docker compose down --rmi all
    rm -rf /home/docker/pika
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 / Registration ---
docker_app_plus
