name: App Full Lifecycle Test

on:
  push:
    branches: [ main ]

jobs:
  test-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget expect docker.io

      - name: Detect Changed App
        id: detect
        run: |
          APP_NAME=$(git log -1 --name-only --format="" | grep '\.conf$' | head -n 1 | sed 's/\.conf//' | xargs)
          echo "app=$APP_NAME" >> "$GITHUB_OUTPUT"
          if [ -z "$APP_NAME" ]; then
            echo "No .conf file modified, skipping test."
          else
            echo "Testing App: $APP_NAME"
          fi

      - name: Run Lifecycle Test
        if: steps.detect.outputs.app != ''
        run: |
          chmod +x .github/test_app.exp
          expect .github/test_app.exp "${{ steps.detect.outputs.app }}"
          echo "=== Final container state ==="
          docker ps -a
