# Grok2API Configuration for stone086/apps
# Official: https://github.com/chenyme/grok2api
# Based on FastAPI, OpenAI-compatible API for Grok models (chat, image, video generation)

local app_id="grok2api"
local app_name="Grok2API"
local app_text="鍩轰簬FastAPI鐨凣rok API鏈嶅姟锛屾敮鎸佸璇?鍥惧儚/瑙嗛鐢熸垚涓庤礋杞藉潎琛?
local app_url="https://github.com/chenyme/grok2api"
local docker_name="grok2api"
local docker_port="${docker_port:-8000}"
local app_size="2"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/data" "${app_dir}/logs"
    cd "${app_dir}" || return 1

    # 涓嬭浇 docker-compose.yml锛堜娇鐢?gh_proxy 纭繚鍥藉唴璁块棶锛?    curl -L -o docker-compose.yml "${gh_proxy}https://raw.githubusercontent.com/chenyme/grok2api/main/docker-compose.yml"

    # 鍒涘缓 .env 閰嶇疆鏂囦欢锛堜娇鐢ㄧ敤鎴疯嚜瀹氫箟绔彛锛?    cat <<EOF > .env
# 鏃ュ織閰嶇疆
LOG_LEVEL=INFO
LOG_FILE_ENABLED=false

# 鏁版嵁鐩綍
DATA_DIR=/app/data

# 鏈嶅姟閰嶇疆
SERVER_HOST=0.0.0.0
SERVER_PORT=${docker_port}
HOST_PORT=${docker_port}

# 瀛樺偍绫诲瀷锛坙ocal/redis/mysql/pgsql锛?SERVER_STORAGE_TYPE=local
SERVER_STORAGE_URL=

# 鍚庡彴瀵嗙爜锛堣淇敼锛?app.app_key=grok2api

# API瀵嗛挜锛堝彲閫夛紝鏀寔澶氫釜閫楀彿鍒嗛殧锛?app.api_key=
EOF

    # 鍚姩瀹瑰櫒锛?env 涓殑 HOST_PORT 浼氬湪 compose 涓敓鏁堬級
    docker compose up -d

    echo "Grok2API 宸查儴缃插畬鎴愶紒"
    check_docker_app_ip
    echo "绠＄悊鍚庡彴锛歨ttp://\${server_ip}:${docker_port}/admin"
    echo "榛樿瀵嗙爜锛歡rok2api锛堣鍙婃椂淇敼锛?
    echo "閰嶇疆鐩綍锛?{app_dir}/data"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "Grok2API 宸叉洿鏂拌嚦鏈€鏂扮増鏈€?
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "Grok2API 宸插交搴曞嵏杞斤紝鍖呮嫭鎵€鏈夋暟鎹€?
}

