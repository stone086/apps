docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}"/config "${app_dir}"/images
    cd "${app_dir}" || return 1

    # 鐩存帴宓屽叆瀹樻柟鎺ㄨ崘 docker-compose.yml锛堥伩鍏嶄笅杞戒緷璧栵級
    cat <<EOF > docker-compose.yml
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*  # 鐢熶骇鐜璇锋敼涓烘偍鐨勫煙鍚嶆垨 IP:绔彛锛屼緥濡?example.com 鎴?192.168.1.100:3000
      - PUID=1000
      - PGID=1000
    ports:
      - "3000:3000"  # 灏嗚 sed 鏇挎崲涓?\${docker_port}:3000
    volumes:
      - ${app_dir}/config:/app/config
      - ${app_dir}/images:/app/public/images  # 鍙€夛紝鐢ㄤ簬鑷畾涔夊浘鏍?      - /var/run/docker.sock:/var/run/docker.sock:ro  # 鍙€夛紝鍚敤 Docker 瀹瑰櫒鑷姩鍙戠幇涓庣姸鎬佺洃鎺?    restart: unless-stopped
EOF

    # 鏇挎崲榛樿绔彛涓虹敤鎴疯嚜瀹氫箟绔彛
    sed -i "s/\"3000:3000\"/\"${docker_port}:3000\"/g" docker-compose.yml

    # 鍚姩瀹瑰櫒
    docker compose up -d

    # 鏄剧ず璁块棶淇℃伅
    echo "Homepage 宸查儴缃插畬鎴愶紒"
    check_docker_app_ip
    echo "閲嶈锛氶娆″惎鍔ㄥ悗锛岃绔嬪嵆缂栬緫 /home/docker/Homepage/config/settings.yml 绛夋枃浠惰繘琛岃嚜瀹氫箟銆?
    echo "瀹夊叏鎻愮ず锛氱敓浜х幆澧冨己鐑堝缓璁皢 HOMEPAGE_ALLOWED_HOSTS 淇敼涓哄叿浣撳€硷紙濡傛偍鐨勫煙鍚嶆垨 IP:绔彛锛夛紝閬垮厤瀹夊叏椋庨櫓銆?
    echo "鍙€夊姛鑳斤細Docker 闆嗘垚宸插惎鐢紙閫氳繃 socket 鎸傝浇锛夛紝鍙湪 docker.yaml 涓厤缃嚜鍔ㄦ湇鍔″彂鐜般€?
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "Homepage 宸叉洿鏂拌嚦鏈€鏂扮増鏈€?
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "Homepage 宸插交搴曞嵏杞斤紝鍖呮嫭鎵€鏈夐厤缃暟鎹€?
}

