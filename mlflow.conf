local app_id="mlflow"
local app_name="MLflow"
local app_text="寮€婧怉I/ML寮€鍙戝钩鍙帮紝鏀寔瀹為獙杩借釜銆佹ā鍨嬬鐞嗐€丩LM鍙娴嬫€т笌璇勪及"
local app_url="https://github.com/mlflow/mlflow"
local docker_name="mlflow"
local docker_port="${docker_port:-5000}"
local app_size="2"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/data" "${app_dir}/artifacts"
    cd "${app_dir}" || return 1

    cat <<EOF > docker-compose.yml
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.0-full
    container_name: mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/data/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ${app_dir}/data:/mlflow/data
      - ${app_dir}/artifacts:/mlflow/artifacts
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow/data/mlflow.db
    restart: unless-stopped
EOF

    # 鏇挎崲榛樿绔彛涓虹敤鎴疯嚜瀹氫箟绔彛
    sed -i "s/\"5000:5000\"/\"${docker_port}:5000\"/g" docker-compose.yml

    # 鍚姩瀹瑰櫒
    docker compose up -d

    echo "MLflow 宸查儴缃插畬鎴愶紒"
    check_docker_app_ip
    echo "鏁版嵁瀛樺偍锛?{app_dir}/data锛圫QLite 鏁版嵁搴擄級"
    echo "妯″瀷浜х墿锛?{app_dir}/artifacts"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "MLflow 宸叉洿鏂拌嚦鏈€鏂扮増鏈€?
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "MLflow 宸插交搴曞嵏杞斤紝鍖呮嫭鎵€鏈夋暟鎹笌妯″瀷浜х墿銆?
}

